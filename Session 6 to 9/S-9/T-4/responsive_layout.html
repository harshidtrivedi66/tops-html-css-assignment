<!DOCTYPE html>
<html>

<head>

    <title>Responsive Bootstrap Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row">

        <div class="col-12 col-md-6">

            <div class="card">

                <img src="d-2u5ipu8aae9sr.jpg"
                     class="card-img-top"
                     alt="Movie">

                <div class="card-body">

                    <h3>Super 30</h3>

                    <p>Biographical Drama</p>

                </div>

            </div>

        </div>

        <div class="col-12 col-md-6">

            <div class="card">

                <div class="card-body">

                    <h2>Movie Details</h2>

                    <p><strong>Rating:</strong> (4.8/5)</p>

                    <p>
                        Super 30 is a biographical drama film that tells the story of a teacher who helps underprivileged students achieve their dreams.
                    </p>

                    <button class="btn btn-danger">
                        Book Now
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
