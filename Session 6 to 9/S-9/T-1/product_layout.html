<!DOCTYPE html>
<html>

<head>

    <title>Flipkart Product Grid</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-4">

            <div class="card">

                <img src="61cIHzCDl6L.jpg" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Boat Headphones
                    </h5>

                    <p class="card-text">
                        $1,499
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <img src="images.jpg" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        Samsung Mobile
                    </h5>

                    <p class="card-text">
                        $19,999
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <img src="IMG_3724.webp" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        HP Laptop
                    </h5>

                    <p class="card-text">
                        $55,999
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
