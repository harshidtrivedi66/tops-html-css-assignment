<!DOCTYPE html>
<html>

<head>

    <title>Zomato Restaurant Listing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row">

        <div class="col-6">

            <div class="card">

                <img src="hotel-president.jpg" class="card-img-top" alt="Restaurant">

                <div class="card-body">

                    <h4 class="card-title">
                        Hotel President
                    </h4>

                    <p class="card-text">
                        Authentic Gujarati and Punjabi Thali including Chinese with delicious food.
                    </p>

                </div>

            </div>

        </div>

        <div class="col-6">

            <div class="card">

                <img src="ideal-for-wedding.jpeg" class="card-img-top" alt="Restaurant">

                <div class="card-body">

                    <h4 class="card-title">
                        Barbeque Nation
                    </h4>

                    <p class="card-text">
                        Unlimited BBQ and buffet with great ambience.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
