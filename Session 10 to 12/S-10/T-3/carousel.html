<!DOCTYPE html>
<html>

<head>

    <title>Movie Carousel</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .carousel{
            width:450px;
            margin:auto;
        }

        .carousel-item img{
            width:100%;
            height:650px;
            object-fit:cover;
            border-radius:10px;
        }

        h2{
            text-align:center;
            margin:30px 0;
        }

    </style>

</head>

<body>

<h2>Movie Carousel</h2>

<div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="p_1.jpg" class="d-block w-100" alt="Laalo">
        </div>

        <div class="carousel-item">
            <img src="p_3.jpg" class="d-block w-100" alt="Welcome">
        </div>

        <div class="carousel-item">
            <img src="p_4.jpg" class="d-block w-100" alt="Sonu Ke Titu Ki Sweety">
        </div>

    </div>

    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#movieCarousel"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#movieCarousel"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
