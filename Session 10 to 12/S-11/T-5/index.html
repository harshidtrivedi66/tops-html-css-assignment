<!DOCTYPE html>
<html>

<head>

    <title>Theme Switcher</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container bg-light text-dark p-5 mt-5 rounded text-center" id="themeBox">

    <h2>
        Bootstrap Theme Switcher
    </h2>

    <p>
        Click the button to switch between Light and Dark themes.
    </p>

    <button class="btn btn-primary" onclick="changeTheme()">
        Change Theme
    </button>

</div>

<script>

function changeTheme(){

    let box = document.getElementById("themeBox");

    box.classList.toggle("bg-light");
    box.classList.toggle("text-dark");

    box.classList.toggle("bg-dark");
    box.classList.toggle("text-light");

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
