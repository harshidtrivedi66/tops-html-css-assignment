<!DOCTYPE html>
<html>

<head>

    <title>Movie Review Card</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card mx-auto shadow" style="width:22rem;">

        <img src="MV5BMTQ4MzQzMzM2Nl5BMl5BanBnXkFtZTgwMTQ1NzU3MDI@._V1_.jpg" class="card-img-top" alt="Movie Poster">

        <div class="card-body">

            <h3 class="fw-bold">
                Dangal
            </h3>

            <h5 class="text-warning">
                4.5 / 5
            </h5>

            <p class="fs-6 text-muted">
                Dangal is a 2016 Indian Hindi-language biographical sports drama film directed by Nitesh Tiwari. The film stars Aamir Khan as Mahavir Singh Phogat, a former wrestler who trains his daughters Geeta and Babita to become world-class wrestlers.
            </p>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
