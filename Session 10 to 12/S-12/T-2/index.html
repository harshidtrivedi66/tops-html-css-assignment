<!DOCTYPE html>
<html>

<head>

    <title>Spotify Featured Playlists</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .card img{

            height:250px;
            object-fit:cover;

        }

    </style>

</head>

<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center mb-5">
        Featured Spotify Playlists
    </h2>

    <div class="row g-4">

        <div class="col-12 col-md-4">

            <div class="card shadow h-100">

                <img src="playlist_1.jpg" class="card-img-top" alt="Top Hits">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Top Hits
                    </h5>

                    <button class="btn btn-success">
                        Listen Now
                    </button>

                </div>

            </div>

        </div>

        <div class="col-12 col-md-4">

            <div class="card shadow h-100">

                <img src="playlist_2.jpg" class="card-img-top" alt="Romantic Songs">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Romantic Songs
                    </h5>

                    <button class="btn btn-success">
                        Listen Now
                    </button>

                </div>

            </div>

        </div>

        <div class="col-12 col-md-4">

            <div class="card shadow h-100">

                <img src="playlist_3.jpg" class="card-img-top" alt="Workout Mix">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Workout Mix
                    </h5>

                    <button class="btn btn-success">
                        Listen Now
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
