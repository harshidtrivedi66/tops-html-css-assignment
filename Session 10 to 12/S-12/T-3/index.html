<!DOCTYPE html>
<html>

<head>

    <title>Flipkart Product Showcase</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .card img{

            height:220px;
            object-fit:cover;

        }

    </style>

</head>

<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center mb-5">
        Flipkart Product Showcase
    </h2>

    <div class="row g-4">

        <div class="col-6 col-md-3">

            <div class="card shadow h-100">

                <img src="product_1.jpg" class="card-img-top" alt="Headphones">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Boat Headphones
                    </h5>

                    <p class="text-success fw-bold">
                        $1,499
                    </p>

                </div>

            </div>

        </div>

        <div class="col-6 col-md-3">

            <div class="card shadow h-100">

                <img src="product_2.jpg" class="card-img-top" alt="Watch">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Smart Watch
                    </h5>

                    <p class="text-success fw-bold">
                        $2,999
                    </p>

                </div>

            </div>

        </div>

        <div class="col-6 col-md-3">

            <div class="card shadow h-100">

                <img src="product_3.avif" class="card-img-top" alt="Shoes">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Running Shoes
                    </h5>

                    <p class="text-success fw-bold">
                        $1,999
                    </p>

                </div>

            </div>

        </div>

        <div class="col-6 col-md-3">

            <div class="card shadow h-100">

                <img src="product_4.jpg" class="card-img-top" alt="Speaker">

                <div class="card-body text-center">

                    <h5 class="card-title">
                        Bluetooth Speaker
                    </h5>

                    <p class="text-success fw-bold">
                        $1,299
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
